<!DOCTYPE html>
<html>
<head>
  <title>PWA Builder Pro+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- PWA Setup -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4facfe">

  <!-- JSZip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      transition: 0.3s;
    }

    .light {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #333;
    }

    .dark {
      background: #121212;
      color: #eee;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      margin-top: 30px;
    }

    .dark .card {
      background: #1e1e1e;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    .generate { background: #4facfe; color: white; }
    .download { background: #00c853; color: white; }
    .toggle { background: #ff9800; color: white; }

    img {
      width: 80px;
      height: 80px;
      border-radius: 15px;
      display: block;
      margin: 10px auto;
      object-fit: cover;
    }

    pre {
      background: #000;
      color: #0f0;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
    }
  </style>
</head>

<body class="light">

<div class="container">
  <div class="card">
    <h2>🚀 PWA Builder Pro+</h2>

    <input id="name" placeholder="App Name">
    <input id="url" placeholder="Website URL">

    <input type="file" id="iconInput" accept="image/*">
    <img id="preview" style="display:none;">

    <button class="generate" onclick="generate()">Generate</button>
    <button class="download" onclick="downloadZip()">Download ZIP</button>
    <button class="toggle" onclick="toggleMode()">🌙 Toggle Mode</button>

    <button onclick="installApp()">📲 Install App</button>

    <pre id="output">Ready...</pre>
  </div>
</div>

<script>
let files = {};
let iconBase64 = "";

/* ICON PREVIEW */
document.getElementById("iconInput").addEventListener("change", function(e) {
  let file = e.target.files[0];
  let reader = new FileReader();
  reader.onload = function() {
    iconBase64 = reader.result;
    let img = document.getElementById("preview");
    img.src = iconBase64;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
});

/* FIX URL */
function fixURL(url) {
  if (!url.startsWith("http")) {
    return "https://" + url;
  }
  return url;
}

/* GENERATE FILES */
function generate() {
  let name = document.getElementById("name").value;
  let url = fixURL(document.getElementById("url").value);

  if (!name || !url) {
    alert("Fill all fields");
    return;
  }

  files = {};

  files["manifest.json"] = JSON.stringify({
    name: name,
    short_name: name,
    start_url: "index.html",
    display: "standalone",
    background_color: "#ffffff",
    theme_color: "#4facfe",
    icons: iconBase64 ? [{
      src: iconBase64,
      sizes: "192x192",
      type: "image/png"
    }] : []
  }, null, 2);

  files["index.html"] = `
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
</head>
<body style="margin:0;">
<iframe src="${url}" style="border:none;width:100%;height:100vh;"></iframe>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
<\/script>
</body>
</html>
`;

  files["service-worker.js"] = `
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('fetch', e => {
  e.respondWith(fetch(e.request));
});
`;

  document.getElementById("output").textContent =
    "✅ Generated:\n" + Object.keys(files).join("\n");
}

/* ZIP DOWNLOAD */
async function downloadZip() {
  if (Object.keys(files).length === 0) {
    alert("Generate first!");
    return;
  }

  let zip = new JSZip();
  for (let file in files) {
    zip.file(file, files[file]);
  }

  let content = await zip.generateAsync({type:"blob"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = "pwa-files.zip";
  a.click();
}

/* DARK MODE */
function toggleMode() {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

/* SERVICE WORKER (FOR BUILDER APP) */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

/* INSTALL LOGIC */
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("output").textContent = "✅ App ready to install!";
});

async function installApp() {
  if (!deferredPrompt) {
    alert("Wait a few seconds, then try again.");
    return;
  }

  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;

  if (choice.outcome === 'accepted') {
    alert("Installed 🎉");
  }

  deferredPrompt = null;
}
</script>

</body>
</html>
